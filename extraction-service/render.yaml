services:
  - type: web
    name: spread-docling-service
    runtime: docker
    dockerfilePath: ./extraction-service/Dockerfile
    dockerContext: ./extraction-service
    healthCheckPath: /health
    plan: free
    envVars:
      - key: DOCLING_API_KEY
        generateValue: true
      - key: DOCLING_ENABLE_OCR
        value: "false"
      - key: DOCLING_TABLE_STRUCTURE
        value: "false"
      - key: DOCLING_DOCUMENT_TIMEOUT
        value: "90"
      - key: DOCLING_NUM_THREADS
        value: "1"
      - key: EXTRACTION_ENGINE
        value: "auto"
      - key: NATIVE_PDF_MIN_CHARS
        value: "40"
